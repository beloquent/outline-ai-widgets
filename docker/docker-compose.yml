version: '3.8'

# Add-on stack for Outline AI Widgets
# Connects to an existing Outline deployment on the "outline_default" network.
# Does NOT create Outline, its Postgres, or its Redis — those already exist.

services:
  # PostgreSQL with pgvector for AI embeddings (separate from Outline's DB)
  ai-postgres:
    image: pgvector/pgvector:pg16
    container_name: outline-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_service
      POSTGRES_PASSWORD: ${AI_POSTGRES_PASSWORD:-ai_service_password}
      POSTGRES_DB: ai_service
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ai_postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_service -d ai_service"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - widgets-internal
    security_opt:
      - no-new-privileges:true

  # Widgets container (Gateway + Widget Framework + AI Service)
  widgets:
    build:
      context: ..
      dockerfile: docker/Dockerfile.widgets
    container_name: outline-widgets
    restart: unless-stopped
    depends_on:
      ai-postgres:
        condition: service_healthy
    ports:
      - "${GATEWAY_BIND_IP:-127.0.0.1}:5000:5000"
    environment:
      NODE_ENV: production
      # Gateway configuration
      GATEWAY_PORT: 5000
      OUTLINE_URL: http://${OUTLINE_CONTAINER_NAME:-outline_outline_1}:3000
      WIDGET_URL: http://localhost:3003
      AI_SERVICE_URL: http://localhost:3001
      # Security settings
      ENABLE_CSP: ${ENABLE_CSP:-true}
      CSP_REPORT_ONLY: ${CSP_REPORT_ONLY:-false}
      ENFORCE_ORIGIN_CHECK: ${ENFORCE_ORIGIN_CHECK:-true}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      # Widget Framework
      WIDGET_PORT: 3003
      # AI Service
      AI_SERVICE_PORT: 3001
      DATABASE_URL: postgres://ai_service:${AI_POSTGRES_PASSWORD:-ai_service_password}@ai-postgres:5432/ai_service
      AI_ADMIN_SECRET: ${AI_ADMIN_SECRET:-}
      AI_CSRF_SECRET: ${AI_CSRF_SECRET:-}
      # OpenAI for AI features (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Outline API key for document access (can also be set via AI Settings UI)
      OUTLINE_API_KEY: ${OUTLINE_API_KEY:-}
      # Logging level (debug, info, warn, error)
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - outline_default
      - widgets-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/widget-framework/health && wget -qO- http://localhost:3001/ai/health && wget -qO- http://localhost:5000/ > /dev/null"]
      interval: 30s
      timeout: 15s
      start_period: 90s
      retries: 3
    security_opt:
      - no-new-privileges:true

volumes:
  ai_postgres_data:

networks:
  # Join the existing Outline network to reach outline_outline_1
  outline_default:
    external: true
  # Internal network for widgets <-> ai-postgres
  widgets-internal:
    driver: bridge
    internal: true
